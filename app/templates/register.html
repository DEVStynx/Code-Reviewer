{% extends "layout.html" %}

{% block title%}
Register
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
{% endblock %}

{% block body %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
    <div class="review-card" style="max-width:480px; width:100%;">
        <div class="review-card-header">Register</div>
        <div class="review-card-body">
            <form action="/register" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label visually-hidden">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label visually-hidden">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                </div>

                <div class="d-flex flex-column align-items-center">
                    <button type="submit" class="btn btn-primary btn-lg w-75"><i class="bi bi-door-open me-2"></i> Register</button>
                    <a href="/login" class="text-muted mt-2">Already have an account? Log in</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
