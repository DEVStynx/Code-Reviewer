{% extends "layout.html" %}

{% block title%}
Home
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script src="/static/script.js" defer></script>
{% endblock %}

{% block body %}
<div class="code-review-center">
    <div class="card w-75 p-4 shadow-sm">
        <h5 class="card-title text-center mb-4">Paste or Upload Your Code</h5>
        <form method="POST" action="/code/manual" enctype="multipart/form-data" id="code-form">
            <div id="drop-area" class="position-relative mb-3">
                <textarea class="form-control code-input-text" name="code" rows="15" placeholder="Paste your code here..."></textarea>
                
                <!-- zentrales Icon -->
                <div id="drag-drop-image" class="d-none">
                    <i class="bi bi-upload display-1 text-primary"></i>
                </div>

                <input type="file" id="input-file" multiple class="d-none">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary submit-btn"><i class="bi bi-send"></i>Send</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
